# NEXS PPF reverse proxy snippet for host-level nginx
# Scope: ONLY nexsppf.com / www.nexsppf.com
# Prerequisite: Docker service binds Next.js to 127.0.0.1:3102
# Do not paste this into a catch-all/default server block.

upstream nexsppf_web_upstream {
    server 127.0.0.1:3102;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name nexsppf.com www.nexsppf.com russia.nexsppf.com usa.nexsppf.com;

    location / {
        proxy_pass http://nexsppf_web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
    }
}

